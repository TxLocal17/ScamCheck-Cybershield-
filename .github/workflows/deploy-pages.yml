name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tao gemini-config.js tu GitHub Secret
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::error::Chua co GitHub Secret GEMINI_API_KEY"
            exit 1
          fi
          printf '%s\n' 'const GEMINI_API_KEY = "${{ secrets.GEMINI_API_KEY }}";' > gemini-config.js
          ls -la gemini-config.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy len GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
