name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tao gemini-config.js tu GitHub Secret
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::error::Chua co GitHub Secret GEMINI_API_KEY"
            exit 1
          fi
          printf '%s\n' 'const GEMINI_API_KEY = "${{ secrets.GEMINI_API_KEY }}";' > gemini-config.js
          test -f gemini-config.js

      - name: Deploy len nhanh gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SITE_DIR="/tmp/scamcheck-site"
          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR"

          shopt -s dotglob nullglob
          for item in * .[^.]*; do
            case "$item" in
              .git) ;;
              *) cp -R "$item" "$SITE_DIR/" ;;
            esac
          done

          echo "Kiem tra gemini-config.js:"
          ls -la "$SITE_DIR/gemini-config.js"

          cd "$SITE_DIR"
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
