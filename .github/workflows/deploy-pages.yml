name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tao gemini-config.js tu GitHub Secret
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::error::Chua co GitHub Secret GEMINI_API_KEY"
            exit 1
          fi
          printf '%s\n' 'const GEMINI_API_KEY = "${{ secrets.GEMINI_API_KEY }}";' > gemini-config.js
          test -f gemini-config.js || (echo "::error::Khong tao duoc gemini-config.js" && exit 1)

      - name: Deploy len nhanh gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          exclude_assets: .github
